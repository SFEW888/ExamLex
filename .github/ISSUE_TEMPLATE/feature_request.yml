name: Feature request
description: Propose a new exam workflow, automation script, platform adapter, or documentation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Keep requests public-safe. Do not include private prompt bodies.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What learner, maintainer, or agent workflow is blocked?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Skill instructions
        - Automation scripts
        - CLI
        - Documentation
        - Platform adapter
        - Tests and validation
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should maintainers verify the feature works?
