name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  quality:
    # Keep this name stable: branch protection requires the historical matrix check.
    name: Python 3.12 on ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install quality tools
        run: python -m pip install ".[quality]"

      - name: Validate repository
        run: python scripts/validate_repo.py --root . --json

      - name: Verify generated Python mirror
        run: python skills/examlex/scripts/sync_mirror.py --check

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run tests with branch coverage
        run: python -m coverage run -m unittest discover -s tests -q

      - name: Enforce coverage baseline
        run: python -m coverage report

      - name: Check whitespace
        run: git diff --check HEAD^ HEAD

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          - os: ubuntu-latest
            python-version: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover -s tests -q

  build:
    name: Build and smoke-test distribution once
    runs-on: ubuntu-latest
    needs: [quality, test]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build frontend
        run: python -m pip install ".[release]"

      - name: Build distribution artifacts
        run: python -m build

      - name: Smoke-test isolated wheel
        run: python scripts/smoke_test_wheel.py dist
