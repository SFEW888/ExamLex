name: english-exam-ai-tutor
description: Public-safe Codex App adapter for CET-4, CET-6, and postgraduate English tutoring.
entrypoint: ../../skills/english-exam-ai-tutor/SKILL.md
prompt_mode: public-safe
commands:
  validate_repo: python scripts/validate_repo.py --root . --json
  validate_profile: python skills/english-exam-ai-tutor/scripts/validate_profile.py --profile learner-profile.json
  generate_daily_plan: python skills/english-exam-ai-tutor/scripts/generate_daily_plan.py --profile learner-profile.json --ability ability-profile.json --errors error-summary.json --output daily-plan.json
notes:
  - Keep private prompt bodies outside this repository.
  - Use role placeholders from references/assistant-roster.md.
  - Do not store API keys or learner secrets in this adapter.
